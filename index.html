<!DOCTYPE html>
<html>
  <head>
	<style>
		#quotainer {
			position: absolute;
			left: 50%;
			top: 50%;
			-webkit-transform: translate(-50%, -50%);
			transform: translate(-50%, -50%);
			background-color: rgba(50, 48, 51, 0.3);
			color: #FFFFF9;
			padding: 20px;
			border-radius: 20px;
			border: 3px solid white;
		}
		#quote {
			font-family: 'Trebuchet MS', Garamond, serif;
			font-size: 35px;
		}
		#speaker {
			text-align: right;
			font-family: 'Trebuchet MS', Garamond, serif;
			font-size: 25px;
			font-style: italic;
		}
		html, body {
			margin:0px;
			height:100%;
		}
		body {
			background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
			background-size: 400% 400%;
			animation: gradient 15s ease infinite;
			height: 100vh;
		}
		@keyframes gradient {
			0% {
				background-position: 0% 50%;
			}
			50% {
				background-position: 100% 50%;
			}
			100% {
				background-position: 0% 50%;
			}
		}
		
		button {
			padding: 16px 32px;
			text-align: center;
			font-size: 22px;
			margin: 4px 2px;
			transition-duration: 0.4s;
			cursor: pointer;
			margin: auto;
			border-radius: 8px;
		}
		
		button {
			background-color: rgba(0,0,0,0);
			color: black;
			border: 2px solid #black;
		}

		button:hover {
			background-color: rgb(50,50,50);
			color: white;
		}
		</style>
	<script>
		rawdat = ""
	</script>
  </head>
  <body>
	<div id="quotainer">
		<div id="appQ">
			<p id="quote">You can man the hand but you cant hand the man</p>
			<p id="speaker">-Joe Schmoe</p>
		</div>
		<button>Take me to another quote!</button>
	</div>
  </body>
</html>
